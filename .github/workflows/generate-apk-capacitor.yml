name: Gerar APK Android (Capacitor)
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/generate-apk-capacitor.yml']
jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin', cache: 'gradle' }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: android-actions/setup-android@v3
      - run: yes | sdkmanager --licenses || true
      - name: Criar projeto Capacitor
        run: |
          mkdir -p cap-build && cd cap-build
          npm init -y
          npm install @capacitor/cli @capacitor/core @capacitor/android
          mkdir -p www
          cat > www/index.html << 'EOF'
          <!DOCTYPE html><html><head><meta charset="utf-8">
          <meta name="viewport" content="width=device-width,initial-scale=1">
          <title>App</title></head>
          <body style="margin:0">
          <script>window.location.replace('https://b2059ad7-6ee4-44d0-b2ea-47edce418587-00-f6f3cqyyyrqy.spock.replit.dev/assistente/');</script>
          </body></html>
          EOF
          npx cap init "Assistente IA Jurídico" "com.juridico.app" --web-dir www
          npx cap add android
      - name: Build APK (Java 17 — corrige erro Gradle)
        working-directory: cap-build/android
        run: |
          export JAVA_HOME="${JAVA_HOME_17_X64:-$JAVA_HOME}"
          export PATH="$JAVA_HOME/bin:$PATH"
          ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with: { name: apk-capacitor, path: 'cap-build/android/app/build/outputs/apk/**/*.apk', retention-days: 30 }
