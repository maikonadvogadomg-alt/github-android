name: Gerar APK Android
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/generate-apk.yml', 'manifest.webmanifest']
jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin', cache: 'gradle' }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: android-actions/setup-android@v3
      - run: yes | sdkmanager --licenses || true
      - run: npm install -g @bubblewrap/cli
      - name: Inicializar projeto TWA
        run: |
          mkdir -p apk-build && cd apk-build
          bubblewrap init --manifest "https://b2059ad7-6ee4-44d0-b2ea-47edce418587-00-f6f3cqyyyrqy.spock.replit.dev/assistente/manifest.webmanifest" --directory . --skipPwaValidation
      - name: Build APK (Java 17 — corrige erro Gradle)
        working-directory: apk-build
        run: |
          export JAVA_HOME="${JAVA_HOME_17_X64:-$JAVA_HOME}"
          export PATH="$JAVA_HOME/bin:$PATH"
          bubblewrap build --skipPwaValidation
      - uses: actions/upload-artifact@v4
        with: { name: apk-android, path: 'apk-build/**/*.apk', retention-days: 30 }
